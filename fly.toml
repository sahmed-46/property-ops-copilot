app = "property-ops-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "data/runtime/property_ops.db"
  CORS_ORIGINS = "http://localhost:5173,https://property-ops-copilot-ui.vercel.app,https://property-ops-copilot-ui.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
