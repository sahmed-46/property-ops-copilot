# External dataset download settings (cache-first; not fetched at app runtime).
cache_dir: data/cache

downloads:
  cuad_qa:
    source: huggingface_file
    repo: theatticusproject/cuad
    filename: CUAD_v1/master_clauses.csv
    limit: 80
    outfile: cuad_clauses.csv

  propertypilot:
    source: huggingface
    dataset: Matanech/property-pilot-tickets
    split: train
    limit: 150
    outfile: propertypilot_tickets.csv

  nyc_311:
    source: nyc_open_data
    # Housing-related 311 complaints (filtered sample)
    url: https://data.cityofnewyork.us/resource/erm2-nwe9.json
    limit: 200
    complaint_types:
      - HEAT/HOT WATER
      - PLUMBING
      - ELECTRIC
      - PAINT/PLASTER
    outfile: nyc_311_housing_sample.csv

ingest:
  cuad_lease_id: LEASE-CUAD
  cuad_unit_id: UNIT-101
  historical_ticket_status: closed
