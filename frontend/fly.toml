app = "property-ops-copilot-ui"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_API_BASE = "https://property-ops-api.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
